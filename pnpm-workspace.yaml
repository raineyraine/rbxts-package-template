catalogMode: prefer

catalogs:
  build:
    rbxts-transform-debug: ^2.2.0
    rbxts-transform-env: ^3.0.0
    rbxts-transformer-flamework: ^1.3.2
    roblox-ts: ^3.0.0
    typescript: 5.5.3
  dev:
    '@rbxts/jest': 3.13.3-ts.1
    '@rbxts/jest-globals': 3.13.3-ts.1
    '@rbxts/ui-labs': ^2.4.2
  lint:
    '@commitlint/cli': ^20.4.2
    '@commitlint/config-conventional': ^20.4.2
    '@commitlint/prompt-cli': ^20.4.2
    '@isentinel/eslint-config': ^4.9.0
    eslint: ^9.39.3
    eslint-plugin-pnpm: ^1.6.0
    eslint-plugin-react-hooks: ^7.0.1
    eslint-plugin-react-x: ^2.13.0
  prod:
    '@flamework/core': ^1.3.2
    '@rbxts/react': 17.3.7-ts.1
    '@rbxts/react-roblox': 17.3.7-ts.1
  script:
    husky: ^9.1.7
    jiti: ^2.6.1
  types:
    '@commitlint/types': ^20.4.0
    '@rbxts/compiler-types': 3.0.0-types.0
    '@rbxts/types': ^1.0.909
    ts-plugin-sort-import-suggestions: ^1.0.4

cleanupUnusedCatalogs: true

configDependencies:
  '@pnpm/plugin-trusted-deps': 0.2.2+sha512-+ZupiXKJhW2fbSilfyRp+wrAY54MKg+c0JWSFGdeb/y9bUoYN5u4XLOZ0Txk7O2bBa6NMhWrX5mwmsHP3/nm9Q==

onlyBuiltDependencies:
  - unrs-resolver

publicHoistPattern:
  - '*@rbxts*'

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - eslint-config-prettier@9.1.2
  - semver@6.3.1
