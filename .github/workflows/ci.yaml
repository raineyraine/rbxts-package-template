name:           CI   

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          cache: pnpm

          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: pnpm install

      - name: Print versions
        run: |
          git --version
          node --version
          pnpm --version
          pnpm commitlint --version

      - if: github.event_name == 'push'
        name: Validate commit
        run: pnpm commitlint --last --verbose

      - if: github.event_name == 'pull_request'
        name: Validate PR commits
        run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Cache ESLint
        uses: actions/cache@v5
        with:
          key: eslint-cache-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'eslint.config.*') }}-${{ github.run_id }}
          path: .eslintcache
          restore-keys: |
            eslint-cache-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'eslint.config.*') }}-
            eslint-cache-${{ runner.os }}-

      - name: Lint
        run: pnpm run lint:ci
